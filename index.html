<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicados - Dicatillo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --zoco-red: #A51C30;
            --zoco-red-dark: #7B1424;
            --zoco-gold: #D4AF37;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            padding-bottom: 60px; /* Espacio para el ticker inferior */
        }

        .zoco-gradient {
            background: linear-gradient(145deg, var(--zoco-red) 0%, var(--zoco-red-dark) 100%);
        }

        /* Efecto de reflejo de cristal premium */
        .glass-shine {
            position: relative;
            overflow: hidden;
        }
        .glass-shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.7s;
            pointer-events: none;
        }
        .glass-shine:hover::after {
            left: 100%;
            top: 100%;
        }

        .card-hover {
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 60px -12px rgba(123, 20, 36, 0.3);
        }

        .skeleton-loader {
            background: linear-gradient(90deg, transparent, rgba(165, 28, 48, 0.1), transparent);
            background-color: #f1f1f1;
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Estilo compacto para los indicadores del header */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        /* Animación del Ticker de Noticias Inferior */
        .ticker-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: var(--zoco-red-dark);
            color: white;
            z-index: 100;
            display: flex;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            border-top: 3px solid var(--zoco-red);
        }

        .ticker-label {
            background: var(--zoco-red);
            padding: 0 25px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 0.15em;
            z-index: 101;
            position: relative;
            box-shadow: 15px 0 25px rgba(0,0,0,0.4);
            font-style: italic;
        }

        .ticker-content {
            display: flex;
            white-space: nowrap;
            animation: marquee 50s linear infinite;
        }

        .ticker-item {
            display: flex;
            align-items: center;
            padding: 0 50px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.03em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Ocultar scrollbar si es necesario */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen antialiased">

    <!-- Header Section Compacta -->
    <header class="bg-white/95 backdrop-blur-md border-b border-slate-100 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6">
                <!-- Branding y Estatus -->
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3">
                        <div class="zoco-gradient shadow-lg shadow-red-900/20 p-2.5 rounded-xl text-white transform -rotate-2">
                            <i data-lucide="megaphone" class="w-5 h-5"></i>
                        </div>
                        <h1 class="text-xl md:text-2xl font-black text-slate-900 tracking-tighter italic leading-none">Dicatillo</h1>
                    </div>

                    <!-- Indicadores incorporados al lado del título -->
                    <div class="hidden sm:flex items-center gap-3 border-l border-slate-100 pl-6">
                        <!-- Estado Red -->
                        <div class="zoco-gradient text-white glass-shine status-pill shadow-md">
                            <div id="statusDot" class="w-1.5 h-1.5 bg-green-400 rounded-full shadow-[0_0_8px_#4ade80]"></div>
                            <i data-lucide="wifi" class="w-3 h-3 opacity-60"></i>
                            <span id="connectionStatus">ACTIVO</span>
                        </div>
                        <!-- Última Entrada -->
                        <div class="bg-slate-50 border border-slate-100 text-slate-400 status-pill">
                            <i data-lucide="clock-3" class="w-3 h-3 text-red-700/40"></i>
                            <span class="opacity-50 font-bold">FIN:</span>
                            <span id="statRecent" class="text-slate-800 font-extrabold truncate max-w-[120px]">--</span>
                        </div>
                    </div>
                </div>

                <!-- Búsqueda y Acciones -->
                <div class="flex items-center gap-3">
                    <div class="relative flex-1 md:w-64 lg:w-80">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400"></i>
                        <input type="text" id="searchBar" placeholder="Filtrar registros..." 
                            class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border-2 border-transparent focus:border-red-600/20 rounded-xl text-xs outline-none transition-all focus:bg-white shadow-inner font-medium">
                    </div>
                    <button onclick="loadData()" id="refreshBtn" class="p-2.5 bg-white border-2 border-slate-100 text-slate-700 rounded-xl hover:border-red-700 hover:text-red-700 transition-all active:scale-95 group">
                        <i data-lucide="refresh-cw" class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <!-- Error Container -->
        <div id="statusContainer" class="hidden mb-8 p-5 rounded-3xl border-2 border-red-100 bg-red-50 text-red-900 font-bold"></div>

        <!-- Título de Sección -->
        <div class="flex items-center justify-between mb-8 border-b border-slate-50 pb-6">
            <h2 class="text-xl font-black text-slate-800 flex items-center gap-3 tracking-tighter italic">
                <i data-lucide="layout-grid" class="w-6 h-6 text-red-700"></i>
                Publicaciones Recientes
            </h2>
            <div class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] flex items-center gap-2">
                <i data-lucide="history" class="w-3 h-3"></i>
                Auto-Update: 30s
            </div>
        </div>

        <!-- Grid Container -->
        <div id="comunicadosContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Skeletons initial state -->
            <div class="bg-slate-50 p-8 rounded-[40px] h-72 overflow-hidden shadow-inner">
                <div class="h-6 w-1/3 skeleton-loader rounded-lg mb-8"></div>
                <div class="h-5 w-full skeleton-loader rounded-md mb-4"></div>
                <div class="h-10 w-28 skeleton-loader rounded-xl mt-auto"></div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-24 text-center">
            <div class="bg-red-50 p-10 rounded-full mb-8">
                <i data-lucide="search-x" class="w-16 h-16 text-red-200"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 tracking-tighter">Sin registros</h3>
            <button onclick="clearSearch()" class="mt-8 px-10 py-3 zoco-gradient text-white rounded-2xl font-bold hover:opacity-90 shadow-lg shadow-red-900/20">Ver todo</button>
        </div>
    </main>

    <!-- Ticker de Noticias Inferior (Avisos de Columna E) -->
    <div class="ticker-container">
        <div class="ticker-label">AVISOS IMPORTANTES</div>
        <div class="ticker-content" id="tickerContent">
            <div class="ticker-item italic opacity-50">Sincronizando información de última hora...</div>
        </div>
    </div>

    <!-- Modal -->
    <div id="detailModal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[48px] shadow-2xl overflow-hidden">
            <div class="relative p-10 md:p-14">
                <div class="flex justify-between items-start mb-8">
                    <div id="modalBadge"></div>
                    <button onclick="closeModal()" class="p-2 text-slate-300 hover:text-red-700 transition-all">
                        <i data-lucide="x-circle" class="w-10 h-10"></i>
                    </button>
                </div>
                <h2 id="modalTitle" class="text-3xl md:text-5xl font-black text-slate-900 mb-6 leading-[1] tracking-tighter italic"></h2>
                <div class="flex items-center gap-5 mb-10">
                    <div id="modalDate" class="px-5 py-2.5 bg-red-50/50 rounded-full text-sm font-extrabold text-red-800 uppercase tracking-widest flex items-center gap-3">
                        <i data-lucide="calendar-check" class="w-5 h-5 text-red-700"></i>
                        <span></span>
                    </div>
                </div>
                <div id="modalBody" class="text-slate-600 leading-relaxed text-lg whitespace-pre-wrap max-h-[40vh] overflow-y-auto pr-6 font-medium"></div>
                
                <div class="mt-12 pt-8 border-t border-slate-50 flex flex-col sm:flex-row justify-between items-center gap-8">
                    <button onclick="copyToClipboard()" id="btnShare" class="flex items-center gap-3 text-red-700 font-black text-xs tracking-widest hover:scale-105 transition-transform uppercase">
                        <i data-lucide="copy" class="w-5 h-5"></i>
                        Copiar Datos
                    </button>
                    <button onclick="closeModal()" class="w-full sm:w-auto px-14 py-5 zoco-gradient text-white rounded-[24px] font-black text-xs tracking-widest uppercase shadow-xl shadow-red-900/20">
                        Cerrar Registro
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNkeGLRbqTWUp6KLapVafiosdtXasPei7a4vJ7mWtYe8eDZKjbWaHIWYAyNqV_tjywqhBFJTp76dXW/pub?output=csv';
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';

        let allData = [];

        function initIcons() { lucide.createIcons(); }

        function findField(obj, possibleNames) {
            const keys = Object.keys(obj);
            for (let name of possibleNames) {
                const foundKey = keys.find(k => k.toLowerCase().trim() === name.toLowerCase());
                if (foundKey) return obj[foundKey];
            }
            return "";
        }

        // Función para obtener la Columna E específicamente
        function getColumnE(obj) {
            const keys = Object.keys(obj);
            // Si la columna tiene un nombre específico lo buscamos, si no, tomamos la 5ta clave
            const explicit = findField(obj, ['columna e', 'importante', 'aviso', 'importantes']);
            if (explicit) return explicit;
            return keys[4] ? obj[keys[4]] : ""; // 5ta columna (índice 4)
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                let current = "";
                let inQuotes = false;
                const cells = [];
                for(let char of lines[i]) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        cells.push(current.trim());
                        current = "";
                    } else current += char;
                }
                cells.push(current.trim());
                const obj = {};
                headers.forEach((header, index) => {
                    let val = cells[index] || "";
                    obj[header] = val.replace(/^"|"$/g, '').replace(/""/g, '"');
                });
                result.push(obj);
            }
            return result;
        }

        async function loadData() {
            const statusLabel = document.getElementById('connectionStatus');
            const statusDot = document.getElementById('statusDot');
            const tickerBox = document.getElementById('tickerContent');
            const timestamp = new Date().getTime();
            const targetUrl = `${BASE_URL}&t=${timestamp}`;

            statusLabel.textContent = "ACTUALIZANDO";
            statusDot.className = "w-1.5 h-1.5 bg-amber-400 rounded-full animate-pulse";

            try {
                let response;
                try {
                    response = await fetch(targetUrl);
                } catch (e) {
                    response = await fetch(`${PROXY_URL}${encodeURIComponent(targetUrl)}`);
                }

                if (!response.ok) throw new Error("Error de red");
                
                const csvText = await response.text();
                const parsed = parseCSV(csvText);
                
                // 1. Procesar Comunicados (Columnas A, B, C...)
                allData = parsed.map(item => ({
                    Titulo: findField(item, ['titulo', 'título', 'asunto', 'tema']),
                    Comunicado: findField(item, ['comunicado', 'mensaje', 'contenido', 'descripcion', 'descripción']),
                    Fecha: findField(item, ['fecha', 'date', 'momento'])
                })).filter(item => item.Titulo || item.Comunicado);
                
                allData.reverse(); 
                
                // Actualizar info en header
                document.getElementById('statRecent').textContent = allData[0]?.Titulo || '--';
                
                // 2. Procesar Ticker (Columna E)
                const tickerMessages = parsed.map(item => getColumnE(item)).filter(m => m && m.trim().length > 0);
                if (tickerMessages.length > 0) {
                    // Duplicamos el contenido para que la animación no tenga cortes
                    const content = [...tickerMessages, ...tickerMessages].map(msg => `
                        <div class="ticker-item">
                            <span class="text-amber-400 mr-2">✦</span> ${msg}
                        </div>
                    `).join('');
                    tickerBox.innerHTML = content;
                }
                
                const searchTerm = document.getElementById('searchBar').value.trim();
                if (!searchTerm) {
                    renderData(allData);
                } else {
                    const filtered = allData.filter(item => 
                        (item.Titulo || "").toLowerCase().includes(searchTerm.toLowerCase()) || 
                        (item.Comunicado || "").toLowerCase().includes(searchTerm.toLowerCase())
                    );
                    renderData(filtered);
                }
                
                statusLabel.textContent = "ACTIVO";
                statusDot.className = "w-1.5 h-1.5 bg-green-400 rounded-full shadow-[0_0_8px_#4ade80]";
                
            } catch (error) {
                console.error(error);
                statusLabel.textContent = "ERROR";
                statusDot.className = "w-1.5 h-1.5 bg-red-400 rounded-full";
            }
        }

        function getCategoryInfo(text, title) {
            const content = (text + " " + title).toLowerCase();
            if (content.includes("urgente") || content.includes("importante") || content.includes("alerta")) 
                return { label: "Urgente", theme: "gold", icon: "zap" };
            return { label: "Registro", theme: "white", icon: "calendar" };
        }

        function renderData(data) {
            const container = document.getElementById('comunicadosContainer');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = "";

            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            data.forEach(item => {
                const info = getCategoryInfo(item.Comunicado, item.Titulo);
                const themeClasses = {
                    gold: "bg-amber-400 text-red-900 border-amber-500",
                    white: "bg-white/10 text-white border-white/20",
                };

                const card = document.createElement('div');
                card.className = 'card-hover zoco-gradient glass-shine p-10 rounded-[44px] flex flex-col h-full cursor-pointer shadow-2xl';
                card.onclick = () => openModal(item, info, themeClasses[info.theme]);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <span class="px-5 py-2 rounded-xl text-[11px] font-black uppercase tracking-widest border ${themeClasses[info.theme]} flex items-center gap-3 shadow-sm">
                            <i data-lucide="calendar" class="w-4 h-4"></i>
                            ${item.Fecha || 'SIN FECHA'}
                        </span>
                        ${info.label === 'Urgente' ? `<div class="bg-amber-400/20 p-2 rounded-full text-amber-400 animate-pulse"><i data-lucide="zap" class="w-4 h-4"></i></div>` : ''}
                    </div>
                    <h2 class="text-2xl font-black text-white mb-6 line-clamp-2 leading-[1.1] tracking-tighter italic">
                        ${item.Titulo || 'Sin Título'}
                    </h2>
                    <p class="text-white/60 text-sm line-clamp-4 mb-10 flex-grow leading-relaxed font-medium">
                        ${item.Comunicado}
                    </p>
                    <div class="flex items-center text-white text-[10px] font-black tracking-[0.2em] gap-4 mt-auto uppercase">
                        Desplegar Registro
                        <div class="w-10 h-10 rounded-2xl bg-white/10 flex items-center justify-center group-hover:bg-white group-hover:text-red-800 transition-all">
                             <i data-lucide="plus" class="w-5 h-5"></i>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            initIcons();
        }

        function openModal(item, info, badgeClass) {
            const modal = document.getElementById('detailModal');
            document.getElementById('modalTitle').textContent = item.Titulo || 'Registro';
            document.getElementById('modalBody').textContent = item.Comunicado || '';
            document.getElementById('modalDate').querySelector('span').textContent = item.Fecha || 'REGISTRO ARCHIVADO';
            const badge = document.getElementById('modalBadge');
            badge.innerHTML = `<span class="px-5 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-[0.2em] bg-red-50 text-red-800 border-2 border-red-100 flex items-center gap-3 shadow-sm"><i data-lucide="calendar" class="w-5 h-5 text-red-700"></i>${item.Fecha || 'HISTÓRICO'}</span>`;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            initIcons();
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function clearSearch() {
            document.getElementById('searchBar').value = '';
            renderData(allData);
        }

        document.getElementById('searchBar').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allData.filter(item => 
                (item.Titulo || "").toLowerCase().includes(term) || 
                (item.Comunicado || "").toLowerCase().includes(term)
            );
            renderData(filtered);
        });

        function copyToClipboard() {
            const title = document.getElementById('modalTitle').textContent;
            const body = document.getElementById('modalBody').textContent;
            const fullText = `${title}\n\n${body}`;
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = fullText; dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            const btn = document.getElementById('btnShare');
            const original = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check" class="w-5 h-5 text-green-600"></i> <span class="text-green-600 tracking-widest">COPIADO</span>`;
            initIcons();
            setTimeout(() => { btn.innerHTML = original; initIcons(); }, 2000);
        }

        window.onload = () => { 
            loadData(); 
            initIcons();
            setInterval(loadData, 30000); // Actualización cada 30 segundos
        };
    </script>
</body>
</html>
